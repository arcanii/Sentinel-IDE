# Sentinel project manifest (read by Sentinel-IDE; snc parses the full TOML).
# A project is a library or an executable; debug/release are build targets.

[project]
name    = "crypto-lib"
version = "0.1.0"
type    = "executable"
entry   = "crypto.sentinel"
icon    = "../art/S2_icon.png"
authors = ["Bryan"]

[build]
src          = "."
lib_paths    = []
links        = []
# Build tier (TIERED_RELEASES.md): development | experimental | stable | hardened.
# The IDE's top selector picks the active tier; output → target/<tier>/.
default_tier = "experimental"

# require = warn|strict makes the IDE emit snc --require-signatures/--trust (ADR 0061).
#
# Deliberately "warn", not "off": a malformed sentinel-trust.toml is a TOML parse error
# that aborts the build in warn *and* strict, so leaving the gate armed means an ordinary
# build of this example regression-tests the manifest schema. With "off" the flags are
# never passed and a broken schema goes unnoticed until someone turns signing on.
#
# Not "strict" because the `hello` target is intentionally unsigned — strict would refuse
# it. Under warn, `crypto` reports `trust: verified — key 58ad2d8c…` and `hello` warns.
[signing]
require = "warn"
trust   = "sentinel-trust.toml"
sign    = false

# Build targets (Xcode-style). With no [[target]] blocks the [project] above is the
# single implicit target; declared targets override it. The scheme selector at the
# top of the window (target ▾ · tier ▾) picks the active one; output → target/<tier>/.
[[target]]
name  = "crypto"
type  = "executable"
entry = "crypto.sentinel"

[[target]]
name  = "hello"
type  = "executable"
entry = "hello.sentinel"
